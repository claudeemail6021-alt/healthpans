name: Deploy to Cloudflare Workers

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Verify autoprefixer installed
        run: |
          echo "Checking node_modules..."
          ls node_modules/autoprefixer && echo "autoprefixer FOUND" || echo "autoprefixer NOT FOUND"
          ls node_modules/postcss && echo "postcss FOUND" || echo "postcss NOT FOUND"
          cat package.json | grep -A5 '"dependencies"'

      - name: Build
        run: npx @cloudflare/next-on-pages

      - name: Deploy
        run: |
          echo "_worker.js" > .vercel/output/static/.assetsignore
          npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
